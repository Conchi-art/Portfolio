			border-radius: 10px;
			padding-top: 45px;
			padding-bottom: 45px;
		}
		aside ul li:hover{
			background-color: white;
			box-shadow: 0px 1px 10px rgba(0, 0, 0, 0.4);
			transition: all 500ms ease;
		}
		li{
			font-size: 30px;

		}
		ul a{

		}
		ul a:hover{

			color: #7280A6;
		}
		article{

			padding: 35px;
			padding-right: 50px;
			padding-left: 0;

		section article img{
